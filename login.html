```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>INFDEMIC - Inicio de sesión</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>INFDEMIC</h1>
    <p>Acceso a la plataforma sanitaria</p>
</header>

<main class="login-contenedor">
    <section class="card login-card">
        <h2>Iniciar sesión</h2>

        <p>
            Introduce las credenciales asignadas
            según tu función dentro del sistema.
        </p>

        <form id="formLogin">
            <label for="email">
                Correo electrónico
            </label>

            <input
                type="email"
                id="email"
                required
                autocomplete="username"
                placeholder="usuario@infdemic.local"
            >

            <label for="password">
                Contraseña
            </label>

            <input
                type="password"
                id="password"
                required
                autocomplete="current-password"
                placeholder="Contraseña"
            >

            <button type="submit">
                Iniciar sesión
            </button>
        </form>

        <div id="mensajeLogin"></div>
    </section>
</main>

<footer>
    <p>
        Demo académica INFDEMIC -
        Datos ficticios
    </p>
</footer>

<script src="auth.js?v=1"></script>
<script src="login.js?v=1"></script>

</body>
</html>
```
